<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Document</title>
</head>
<body>
    <form>
        <label for="user">Username</label>
            <br>
            <input type="text" id="user" class="form-control" placeholder="Enter here" required>
            <br>
    </form>
    <form>
        <label for="pw">Password</label>
            <br>
            <input type="password" id="pw" class="form-control" placeholder="Enter here" required>
            <br>
    </form>

    <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
    <input type="reset" name="reset" id="cancelBTN" value="Cancel" class="btn btn-info rounded-5" onclick="authenticate()">


</body>
</html>
